<a
  class="rrc-brand hx:ltr:mr-auto hx:rtl:ml-auto hx:no-underline"
  href="{{ .Site.Home.RelPermalink }}"
  aria-label="{{ .Site.Title }}"
>
  <span class="rrc-brand-mark">
    <img
      src="{{ "images/logo-dark.svg" | relURL }}"
      alt=""
      aria-hidden="true"
      width="32"
      height="32"
      class="hx:block hx:shrink-0"
    />
  </span>
  <span class="rrc-brand-copy">
    <span class="rrc-brand-kicker">Belgium · Aug 4–9, 2026</span>
    <span class="rrc-brand-name">{{ .Site.Title }}</span>
  </span>
</a>
