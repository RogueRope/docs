<a
  class="hx:flex hx:items-center hx:gap-2 hx:hover:opacity-80 hx:transition-opacity hx:ltr:mr-auto hx:rtl:ml-auto hx:no-underline"
  href="{{ .Site.Home.RelPermalink }}"
  aria-label="{{ .Site.Title }}"
>
  <img
    src="{{ "images/logo-dark.svg" | relURL }}"
    alt=""
    aria-hidden="true"
    width="32"
    height="32"
    class="hx:block hx:shrink-0"
  />
  <span
    class="hx:font-extrabold hx:tracking-wide hx:text-sm hx:uppercase hx:select-none"
    style="background: linear-gradient(135deg, #a78bfa 0%, #ff6b35 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 0.12em;"
  >
    Bottoms Up!
  </span>
</a>
